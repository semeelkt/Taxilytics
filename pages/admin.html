<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Finreg</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/png" href="../img/1000473289.png">
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .sidebar-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      padding: 0;
      background: var(--color-bg-input);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text-primary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .sidebar-toggle:hover {
      background: var(--color-accent-light);
      border-color: var(--color-accent);
      color: var(--color-accent);
    }
    .sidebar-toggle i {
      font-size: 18px;
    }
    @media (max-width: 1024px) {
      .sidebar-toggle {
        display: flex;
      }
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }
    .sidebar-overlay.active {
      display: block;
    }

    .admin-badge {
      background: var(--color-error);
      color: white;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: 600;
      margin-left: var(--spacing-sm);
    }

    .submission-card {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
      background: var(--color-bg-input);
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-sm);
    }

    .submission-avatar {
      width: 40px;
      height: 40px;
      background: var(--color-accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      flex-shrink: 0;
    }

    .submission-info {
      flex: 1;
    }

    .access-denied {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: var(--spacing-lg);
    }

    .access-denied h1 {
      font-size: var(--font-size-3xl);
      margin-bottom: var(--spacing-md);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="accessDenied" class="access-denied">
    <h1>🔐 Access Denied</h1>
    <p style="color: var(--color-text-secondary); margin-bottom: var(--spacing-lg);">
      Invalid or missing access token. Admin access requires proper authentication.
    </p>
    <a href="/" class="btn btn-primary">
      <i class="fas fa-home"></i>
      Back to Home
    </a>
  </div>

  <div id="adminPanel" class="hidden">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="dashboard-layout">
      <!-- Sidebar -->
      <aside class="dashboard-sidebar" id="sidebar">
        <div class="sidebar-header">
          <a href="/" class="nav-logo">
            <img src="../img/logo.png" alt="Finreg Logo" style="height: 32px;">
            <span>Finreg</span>
            <span class="admin-badge">Admin</span>
          </a>
        </div>

        <nav class="sidebar-nav">
          <a href="#overview" class="sidebar-link active" data-tab="overview">
            <i class="fas fa-chart-line"></i>
            <span>Overview</span>
          </a>
          <a href="#submissions" class="sidebar-link" data-tab="submissions">
            <i class="fas fa-inbox"></i>
            <span>Client Submissions</span>
          </a>
        </nav>

        <div style="margin-top: auto; padding-top: var(--spacing-xl);">
          <a href="/" class="sidebar-link">
            <i class="fas fa-home"></i>
            <span>Back to Site</span>
          </a>
          <a href="#" class="sidebar-link" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="dashboard-main">
        <div class="dashboard-header">
          <div style="display: flex; align-items: center; gap: var(--spacing-md);">
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Menu">
              <i class="fas fa-bars"></i>
            </button>
            <div>
              <h1 class="dashboard-title">Admin Dashboard</h1>
              <p class="text-muted">Manage client submissions</p>
            </div>
          </div>
        </div>

        <!-- Overview Tab -->
        <div class="tab-content active" id="overview-content">
          <div class="dashboard-stats">
            <div class="stat-card">
              <div class="stat-label">Total Submissions</div>
              <div class="stat-value" id="totalSubmissions">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">This Month</div>
              <div class="stat-value" id="monthlySubmissions">0</div>
            </div>
          </div>

          <!-- Recent Submissions -->
          <div class="card mt-xl">
            <div class="card-header">
              <h3 class="card-title">Recent Submissions</h3>
            </div>
            <div id="recentSubmissionsList">
              <div class="loading"><div class="spinner"></div></div>
            </div>
          </div>
        </div>

        <!-- Submissions Tab -->
        <div class="tab-content" id="submissions-content">
          <div class="card">
            <div class="card-header flex-between">
              <h3 class="card-title">All Client Submissions</h3>
            </div>
            <div id="submissionsList">
              <div class="loading"><div class="spinner"></div></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module">
    import { validateAdminToken } from '../js/config.js';
    import { subscribeToAllSubmissions, deleteSubmission } from '../js/submissions.js';
    import { showError, showSuccess } from '../js/notifications.js';

    // Get token from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Check token validity
    if (!token || !validateAdminToken(token)) {
      // Show access denied, hide admin panel
      document.getElementById('accessDenied').style.display = 'flex';
      document.getElementById('adminPanel').classList.add('hidden');
      console.error('Invalid or missing admin token');
      throw new Error('Unauthorized');
    }

    // Token is valid, show admin panel
    document.getElementById('accessDenied').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');

    let submissionsData = [];

    // Sidebar toggle
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function toggleSidebar() {
      sidebar.classList.toggle('active');
      sidebarOverlay.classList.toggle('active');
    }

    sidebarToggle.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    // Close sidebar when clicking a link
    document.querySelectorAll('.sidebar-link').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 1024) {
          sidebar.classList.remove('active');
          sidebarOverlay.classList.remove('active');
        }
      });
    });

    // Initialize dashboard
    try {
      subscribeToAllSubmissions(token, (submissions) => {
        submissionsData = submissions;
        updateSubmissionsUI(submissions);
        updateStats();
      });
    } catch (error) {
      console.error('Failed to load submissions:', error);
      showError('Failed to load submissions');
    }

    // Tab navigation
    document.querySelectorAll('.sidebar-link[data-tab]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const tab = link.dataset.tab;

        document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');

        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`${tab}-content`).classList.add('active');
      });
    });

    function updateStats() {
      document.getElementById('totalSubmissions').textContent = submissionsData.length;

      // Count this month's submissions
      const now = new Date();
      const currentMonth = now.getMonth();
      const currentYear = now.getFullYear();
      const monthlyCount = submissionsData.filter(s => {
        const date = s.submittedAt.toDate ? s.submittedAt.toDate() : new Date(s.submittedAt);
        return date.getMonth() === currentMonth && date.getFullYear() === currentYear;
      }).length;

      document.getElementById('monthlySubmissions').textContent = monthlyCount;
    }

    function updateSubmissionsUI(submissions) {
      const recentEl = document.getElementById('recentSubmissionsList');
      const listEl = document.getElementById('submissionsList');

      if (submissions.length === 0) {
        const emptyHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <h4 class="empty-state-title">No Submissions Yet</h4>
            <p class="empty-state-description">Client submissions will appear here.</p>
          </div>
        `;
        recentEl.innerHTML = emptyHTML;
        listEl.innerHTML = emptyHTML;
        return;
      }

      // Render submission card
      const renderSubmission = (submission) => `
        <div class="submission-card">
          <div class="submission-avatar">${(submission.name || 'U')[0].toUpperCase()}</div>
          <div class="submission-info">
            <div style="font-weight: 500;">${submission.name}</div>
            <div class="text-muted" style="font-size: var(--font-size-xs);">
              <a href="mailto:${submission.email}">${submission.email}</a> •
              <a href="tel:${submission.phone}">${submission.phone}</a>
            </div>
            ${submission.notes ? `<div class="text-muted" style="font-size: var(--font-size-xs); margin-top: var(--spacing-xs);">📝 ${submission.notes.substring(0, 50)}${submission.notes.length > 50 ? '...' : ''}</div>` : ''}
            <div class="text-muted" style="font-size: var(--font-size-xs); margin-top: var(--spacing-xs);">
              ${formatTimestamp(submission.submittedAt)}
            </div>
          </div>
          <div style="display: flex; gap: var(--spacing-sm);">
            <a href="https://wa.me/${submission.phone.replace(/[^0-9]/g, '')}" target="_blank" class="btn btn-ghost btn-sm" title="WhatsApp">
              <i class="fab fa-whatsapp"></i>
            </a>
            <button class="btn btn-ghost btn-sm delete-btn" data-id="${submission.id}" title="Delete">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      `;

      // Recent submissions
      recentEl.innerHTML = submissions.slice(0, 5).map(renderSubmission).join('') ||
        '<p class="text-muted text-center">No submissions yet</p>';

      // All submissions
      listEl.innerHTML = `<div class="file-list">${submissions.map(renderSubmission).join('')}</div>`;

      // Delete handlers
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (confirm('Delete this submission?')) {
            const result = await deleteSubmission(token, btn.dataset.id);
            if (result.success) {
              showSuccess('Submission deleted');
            }
          }
        });
      });
    }

    function formatTimestamp(timestamp) {
      if (!timestamp) return 'Just now';
      const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
      e.preventDefault();
      // Remove token from URL and redirect
      window.location.href = '/';
    });
  </script>
</body>
</html>
