<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Finreg</title>
  <meta name="description" content="Manage your tax services, documents, and finances in one place.">
  
  <link rel="icon" type="image/png" href="../img/favicon.png">
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    .file-upload-area {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-base);
      position: relative;
    }
    .file-upload-area:hover, .file-upload-area.dragover {
      border-color: var(--color-accent);
      background: rgba(67, 97, 238, 0.05);
    }
    .file-input-hidden {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .file-preview {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm);
      background: var(--color-bg-input);
      border-radius: var(--radius-sm);
    }
    .file-preview i { color: var(--color-accent); }
    .file-preview span { flex: 1; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/" class="nav-logo">
          <img src="../img/logo.png" alt="Finreg Logo" style="height: 32px;">
          <span>Finreg</span>
        </a>
      </div>
      
      <nav class="sidebar-nav">
        <a href="#overview" class="sidebar-link active" data-tab="overview">
          <i class="fas fa-home"></i>
          <span>Overview</span>
        </a>
        <a href="#requests" class="sidebar-link" data-tab="requests">
          <i class="fas fa-file-invoice"></i>
          <span>My Requests</span>
        </a>
        <a href="#gst-calc" class="sidebar-link" data-tab="gst-calc">
          <i class="fas fa-percent"></i>
          <span>GST Calculator</span>
        </a>
        <a href="/pages/admin.html" class="sidebar-link" id="adminLink" style="display: none;">
          <i class="fas fa-shield-alt"></i>
          <span>Admin Panel</span>
        </a>
      </nav>
      
      <div style="margin-top: auto; padding-top: var(--spacing-xl);">
        <a href="#" class="sidebar-link" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="dashboard-header">
        <div>
          <h1 class="dashboard-title">Welcome, <span id="userName">User</span></h1>
          <p class="text-muted" id="userEmail">user@example.com</p>
        </div>
        <button class="btn btn-primary" id="newRequestBtn">
          <i class="fas fa-plus"></i>
          New Request
        </button>
      </div>

      <!-- Overview Tab -->
      <div class="tab-content active" id="overview-content">
        <div class="dashboard-stats">
          <div class="stat-card">
            <div class="stat-label">Pending Requests</div>
            <div class="stat-value" id="pendingCount">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">In Progress</div>
            <div class="stat-value" id="progressCount">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Completed</div>
            <div class="stat-value positive" id="completedCount">0</div>
          </div>
        </div>

        <!-- Recent Requests -->
        <div class="card">
          <div class="card-header flex-between">
            <h3 class="card-title">Recent Requests</h3>
            <a href="#requests" class="btn btn-ghost btn-sm" data-tab="requests">View All</a>
          </div>
          <div id="recentRequests">
            <div class="loading">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Requests Tab -->
      <div class="tab-content" id="requests-content">
        <div class="card">
          <div class="card-header flex-between">
            <h3 class="card-title">Service Requests</h3>
            <button class="btn btn-primary btn-sm" id="newRequestBtn2">
              <i class="fas fa-plus"></i>
              New Request
            </button>
          </div>
          <div id="requestsList">
            <div class="loading">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Account Book Tab -->
      <!-- GST Calculator Tab -->
      <div class="tab-content" id="gst-calc-content">
        <div class="flex-center">
          <div class="calculator-card" style="max-width: 450px; width: 100%;">
            <h3 class="card-title mb-lg">GST Calculator</h3>
            <form id="dashGstForm">
              <div class="form-group">
                <label class="form-label">Amount (₹)</label>
                <input type="number" name="amount" class="form-input" placeholder="Enter amount" min="0" step="0.01" required>
              </div>
              
              <div class="form-group">
                <label class="form-label">GST Rate</label>
                <select name="gst-rate" class="form-select" required>
                  <option value="5">5%</option>
                  <option value="12">12%</option>
                  <option value="18" selected>18%</option>
                  <option value="28">28%</option>
                </select>
              </div>
              
              <div class="form-group">
                <label class="form-label">Calculation Type</label>
                <select name="calc-type" class="form-select">
                  <option value="exclusive">Add GST to Amount</option>
                  <option value="inclusive">Extract GST from Amount</option>
                </select>
              </div>
              
              <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-calculator"></i>
                Calculate
              </button>
            </form>
            
            <div id="dashCalcResult" class="hidden"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Service Request Modal -->
  <div class="modal-overlay" id="requestModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">New Service Request</h3>
        <button class="modal-close" id="closeRequestModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="serviceRequestForm">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input type="text" name="fullName" class="form-input" id="modalFullName" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input type="email" name="email" class="form-input" id="modalEmail" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone *</label>
            <input type="tel" name="phone" class="form-input" placeholder="+91 XXXXX XXXXX" required>
          </div>
          <div class="form-group">
            <label class="form-label">Service Type *</label>
            <select name="serviceType" class="form-select" required>
              <option value="">Select a service</option>
              <option value="GST Registration">GST Registration</option>
              <option value="TDS Filing">TDS Filing</option>
              <option value="Income Tax Return (ITR)">Income Tax Return (ITR)</option>
              <option value="Bookkeeping">Bookkeeping</option>
              <option value="Tax Consultancy">Tax Consultancy</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-textarea" placeholder="Tell us more..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Attach Document (Optional)</label>
            <div class="file-upload-area" id="fileUploadArea">
              <input type="file" name="document" id="documentInput" class="file-input-hidden" accept=".pdf,.jpg,.jpeg,.png,.gif,.doc,.docx,.xls,.xlsx">
              <div class="file-upload-content" id="fileUploadContent">
                <i class="fas fa-cloud-upload-alt" style="font-size: 32px; color: var(--color-accent); margin-bottom: var(--spacing-sm);"></i>
                <p>Click to upload or drag & drop</p>
                <p class="text-muted" style="font-size: var(--font-size-xs);">PDF, Images, Word, Excel (Max 10MB)</p>
              </div>
              <div class="file-preview hidden" id="filePreview">
                <i class="fas fa-file"></i>
                <span id="fileName"></span>
                <span id="fileSize" class="text-muted"></span>
                <button type="button" class="btn btn-ghost btn-sm" id="removeFile">
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="submitRequestBtn">
            Submit Request
          </button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logOut, getCurrentUser, onAuthChange } from '../js/auth.js';
    import { createServiceRequest, subscribeToUserRequests, getStatusBadgeClass, deleteServiceRequest } from '../js/services.js';
    import { initCalculator } from '../js/calculator.js';
    import { showError, showSuccess } from '../js/notifications.js';
    import { uploadToCloudinary, validateFile, formatFileSize } from '../js/cloudinary.js';

    // Require authentication
    requireAuth('/pages/login.html');

    let currentUser = null;
    let requestsUnsubscribe = null;

    // Wait for auth state
    onAuthChange((user) => {
      if (user) {
        currentUser = user;
        initDashboard();
        
        // Show admin link for admin user
        if (user.email === 'mradminlogged@gmail.com') {
          document.getElementById('adminLink').style.display = 'flex';
        }
      }
    });

    function initDashboard() {
      // Update user info
      document.getElementById('userName').textContent = currentUser.displayName || 'User';
      document.getElementById('userEmail').textContent = currentUser.email;
      document.getElementById('modalFullName').value = currentUser.displayName || '';
      document.getElementById('modalEmail').value = currentUser.email || '';

      // Initialize subscriptions
      initRequestsSubscription();

      // Initialize GST calculator
      initCalculator('dashGstForm', 'dashCalcResult');
    }

    // Tab navigation
    document.querySelectorAll('.sidebar-link[data-tab]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const tab = link.dataset.tab;
        
        // Update active states
        document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`${tab}-content`).classList.add('active');
      });
    });

    // View All links
    document.querySelectorAll('[data-tab]').forEach(el => {
      if (!el.classList.contains('sidebar-link')) {
        el.addEventListener('click', (e) => {
          const tab = el.dataset.tab;
          document.querySelector(`.sidebar-link[data-tab="${tab}"]`)?.click();
        });
      }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      // Cleanup subscriptions
      requestsUnsubscribe?.();
      await logOut();
      window.location.href = '/';
    });

    // Service Requests
    function initRequestsSubscription() {
      requestsUnsubscribe = subscribeToUserRequests((requests) => {
        updateRequestsUI(requests);
        updateStats(requests);
      });
    }

    function updateRequestsUI(requests) {
      const recentEl = document.getElementById('recentRequests');
      const listEl = document.getElementById('requestsList');
      
      if (requests.length === 0) {
        const emptyHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <h4 class="empty-state-title">No Requests Yet</h4>
            <p class="empty-state-description">Submit your first service request to get started.</p>
          </div>
        `;
        recentEl.innerHTML = emptyHTML;
        listEl.innerHTML = emptyHTML;
        return;
      }

      const renderRequest = (req) => `
        <div class="file-item">
          <div class="file-item-icon">${getServiceIcon(req.serviceType)}</div>
          <div class="file-item-info">
            <div class="file-item-name">${req.serviceType}</div>
            <div class="file-item-size">${formatTimestamp(req.createdAt)}</div>
          </div>
          <span class="badge ${getStatusBadgeClass(req.status)}">${req.status}</span>
        </div>
      `;

      recentEl.innerHTML = requests.slice(0, 3).map(renderRequest).join('');
      
      const fullListHTML = requests.map(req => `
        <div class="file-item">
          <div class="file-item-icon">${getServiceIcon(req.serviceType)}</div>
          <div class="file-item-info">
            <div class="file-item-name">${req.serviceType}</div>
            <div class="file-item-size">${req.description || 'No description'} • ${formatTimestamp(req.createdAt)}</div>
          </div>
          <span class="badge ${getStatusBadgeClass(req.status)}">${req.status}</span>
          ${req.status === 'Pending' ? `<button class="btn btn-ghost btn-sm delete-request" data-id="${req.id}" title="Delete"><i class="fas fa-trash"></i></button>` : ''}
        </div>
      `).join('');
      
      listEl.innerHTML = `<div class="file-list">${fullListHTML}</div>`;

      // Delete handlers
      listEl.querySelectorAll('.delete-request').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (confirm('Delete this request?')) {
            await deleteServiceRequest(btn.dataset.id);
          }
        });
      });
    }

    function updateStats(requests) {
      const pending = requests.filter(r => r.status === 'Pending').length;
      const progress = requests.filter(r => r.status === 'In Progress').length;
      const completed = requests.filter(r => r.status === 'Completed').length;

      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('progressCount').textContent = progress;
      document.getElementById('completedCount').textContent = completed;
    }

    // Service request modal
    const requestModal = document.getElementById('requestModal');
    const requestForm = document.getElementById('serviceRequestForm');
    let selectedFile = null;

    // File upload handling
    const fileInput = document.getElementById('documentInput');
    const fileUploadArea = document.getElementById('fileUploadArea');
    const fileUploadContent = document.getElementById('fileUploadContent');
    const filePreview = document.getElementById('filePreview');

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFileSelect(file);
    });

    // Drag and drop
    fileUploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      fileUploadArea.classList.add('dragover');
    });
    fileUploadArea.addEventListener('dragleave', () => {
      fileUploadArea.classList.remove('dragover');
    });
    fileUploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      fileUploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFileSelect(file);
    });

    function handleFileSelect(file) {
      const validation = validateFile(file);
      if (!validation.valid) {
        showError(validation.error);
        return;
      }
      selectedFile = file;
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('fileSize').textContent = formatFileSize(file.size);
      fileUploadContent.classList.add('hidden');
      filePreview.classList.remove('hidden');
    }

    document.getElementById('removeFile').addEventListener('click', (e) => {
      e.stopPropagation();
      selectedFile = null;
      fileInput.value = '';
      fileUploadContent.classList.remove('hidden');
      filePreview.classList.add('hidden');
    });

    document.getElementById('newRequestBtn').addEventListener('click', () => requestModal.classList.add('active'));
    document.getElementById('newRequestBtn2').addEventListener('click', () => requestModal.classList.add('active'));
    document.getElementById('closeRequestModal').addEventListener('click', () => requestModal.classList.remove('active'));
    requestModal.addEventListener('click', (e) => {
      if (e.target === requestModal) requestModal.classList.remove('active');
    });

    requestForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitRequestBtn');
      btn.classList.add('btn-loading');
      btn.disabled = true;

      let documentData = null;

      // Upload file if selected
      if (selectedFile) {
        btn.textContent = 'Uploading file...';
        const uploadResult = await uploadToCloudinary(selectedFile);
        if (uploadResult.success) {
          documentData = {
            url: uploadResult.url,
            fileName: uploadResult.fileName,
            fileType: uploadResult.fileType,
            fileSize: uploadResult.fileSize
          };
        } else {
          showError('File upload failed: ' + uploadResult.error);
          btn.classList.remove('btn-loading');
          btn.disabled = false;
          btn.textContent = 'Submit Request';
          return;
        }
      }

      btn.textContent = 'Submitting...';

      await createServiceRequest({
        fullName: requestForm.fullName.value.trim(),
        email: requestForm.email.value.trim(),
        phone: requestForm.phone.value.trim(),
        serviceType: requestForm.serviceType.value,
        description: requestForm.description.value.trim(),
        document: documentData
      });

      // Reset form
      requestModal.classList.remove('active');
      requestForm.serviceType.value = '';
      requestForm.description.value = '';
      selectedFile = null;
      fileInput.value = '';
      fileUploadContent.classList.remove('hidden');
      filePreview.classList.add('hidden');
      btn.classList.remove('btn-loading');
      btn.disabled = false;
      btn.textContent = 'Submit Request';
    });

    // Helpers
    function getServiceIcon(type) {
      const icons = {
        'GST Registration': '📋',
        'TDS Filing': '📊',
        'Income Tax Return (ITR)': '📁',
        'Bookkeeping': '📚',
        'Tax Consultancy': '💼'
      };
      return icons[type] || '📄';
    }

    function formatTimestamp(timestamp) {
      if (!timestamp) return 'Just now';
      const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }
  </script>
</body>
</html>
