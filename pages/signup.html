<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Finreg</title>
  <meta name="description" content="Create your free Finreg account to access tax services, document storage, and financial tools.">
  
  <link rel="icon" type="image/png" href="../img/favicon.png">
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="auth-logo">
          <img src="../img/logo.png" alt="Finreg Logo" style="width: 80px; margin: 0 auto;">
        </a>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Get started with Finreg today</p>
      </div>
      
      <form id="signupForm">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="Your full name" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="Min. 6 characters" required minlength="6">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="Confirm your password" required minlength="6">
        </div>
        
        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" id="rememberMe" name="rememberMe" checked>
            <span>Keep me signed in</span>
          </label>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          <i class="fas fa-user-plus"></i>
          Create Account
        </button>
      </form>
      
      <div class="auth-footer">
        <p>Already have an account? <a href="/pages/login.html">Sign in</a></p>
        <p class="mt-sm"><a href="/">← Back to Home</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { signUp, redirectIfLoggedIn } from '../js/auth.js';
    import { showError } from '../js/notifications.js';
    
    // Redirect if already logged in
    redirectIfLoggedIn('/pages/dashboard.html');
    
    const form = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = form.name.value.trim();
      const email = form.email.value.trim();
      const password = form.password.value;
      const confirmPassword = form.confirmPassword.value;
      const rememberMe = form.rememberMe.checked;
      
      // Validate passwords match
      if (password !== confirmPassword) {
        showError('Passwords do not match');
        return;
      }
      
      // Show loading state
      submitBtn.classList.add('btn-loading');
      submitBtn.disabled = true;
      
      const result = await signUp(name, email, password, rememberMe);
      
      if (result.success) {
        window.location.href = '/pages/dashboard.html';
      } else {
        submitBtn.classList.remove('btn-loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
